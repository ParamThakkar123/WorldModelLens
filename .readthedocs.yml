version: 2

# Build documentation in the docs/ directory with Sphinx
sphinx:
  configuration: docs/conf.py

# Python version and dependencies
python:
  version: "3.11"
  install:
    - requirements: docs/requirements.txt

# Build on these branches
build:
  os: ubuntu-22.04
  tools:
    python: "3.11"

# Optionally redirect to a specific version
# redirects:
#   /en/latest/: /en/stable/

# Build pull requests (good for previewing changes)
# Comment this out to disable
# Don't build PRs by default to save build minutes
# Uncomment if you want PR preview builds
# build:
#   apt_packages:
#     - build-essential
